<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
    <title>Money Tracker</title>

    <!-- Telegram Mini App SDK — must load first so CSS vars and WebApp API are available -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Apply safe area insets before any paint to prevent layout jump.
         Telegram injects --tg-content-safe-area-inset-top and --tg-safe-area-inset-top
         after the SDK script runs, so we read them here synchronously. -->
    <script>
      (function () {
        try {
          function applyScheme(dark) {
            document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
          }

          var tg = window.Telegram && window.Telegram.WebApp;
          // Only treat as real Telegram context when running inside the actual app
          var inTelegram = tg && tg.initData && tg.initData.length > 0;
          if (inTelegram) {
            tg.ready();
            tg.expand();

            // Apply color scheme before first paint — prevents flash of wrong theme
            applyScheme(tg.colorScheme === 'dark');

            // Apply safe area insets before first paint
            var top =
              (tg.contentSafeAreaInset && tg.contentSafeAreaInset.top || 0) +
              (tg.safeAreaInset && tg.safeAreaInset.top || 0);
            if (top > 0) {
              document.documentElement.style.setProperty('--safe-top', top + 'px');
            }
          } else {
            // Outside Telegram (browser/preview) — use system preference and keep it in sync
            var mq = window.matchMedia('(prefers-color-scheme: dark)');
            applyScheme(mq.matches);
            mq.addEventListener('change', function (e) { applyScheme(e.matches); });
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
