<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Money Tracker</title>

    <!-- Telegram Mini App SDK — must load first so CSS vars and WebApp API are available -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Apply safe area insets before any paint to prevent layout jump.
         Telegram injects --tg-content-safe-area-inset-top and --tg-safe-area-inset-top
         after the SDK script runs, so we read them here synchronously. -->
    <script>
      (function () {
        try {
          var tg = window.Telegram && window.Telegram.WebApp;
          if (tg) {
            tg.ready();
            tg.expand();
            var top =
              (tg.contentSafeAreaInset && tg.contentSafeAreaInset.top || 0) +
              (tg.safeAreaInset && tg.safeAreaInset.top || 0);
            if (top > 0) {
              document.documentElement.style.setProperty('--safe-top', top + 'px');
            }
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
