version: "2"
sql:
  - engine: "postgresql"
    queries: "queries/"
    schema: "migrations/"
    gen:
      go:
        package: "sqlcgen"
        out: "../internal/repository/sqlcgen"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        emit_exact_table_names: false
        overrides:
          - db_type: "transaction_type"
            go_type: "github.com/horexdev/money-tracker/internal/domain.TransactionType"
          - db_type: "pg_catalog.int8"
            go_type: "int64"
