# HTTP — redirect to HTTPS + serve certbot challenges
server {
    listen 80;
    server_name money-tracker.hrxdev.cc;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name money-tracker.hrxdev.cc;

    ssl_certificate     /etc/letsencrypt/live/money-tracker.hrxdev.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/money-tracker.hrxdev.cc/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Mini App static files
    root /var/www/moneytracker;
    index index.html;

    # SPA fallback — all unknown paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API reverse proxy
    location /api/ {
        proxy_pass         http://host.docker.internal:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
