name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout 5m

  test:
    runs-on: ubuntu-latest
    needs: [lint]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: moneytracker_test
          POSTGRES_USER: moneytracker
          POSTGRES_PASSWORD: moneytracker
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U moneytracker -d moneytracker_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run migrations
        env:
          DATABASE_URL: postgres://moneytracker:moneytracker@localhost:5432/moneytracker_test?sslmode=disable
        run: go run github.com/pressly/goose/v3/cmd/goose -dir db/migrations postgres "$DATABASE_URL" up

      - name: Run tests
        env:
          BOT_TOKEN: test_token_placeholder
          DATABASE_URL: postgres://moneytracker:moneytracker@localhost:5432/moneytracker_test?sslmode=disable
          REDIS_URL: redis://localhost:6379
          LOG_LEVEL: warn
          MIGRATIONS_DIR: db/migrations
        run: go test -v -race -timeout 120s -p 2 ./...
