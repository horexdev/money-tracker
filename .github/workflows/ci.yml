name: CI

on:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: --timeout 5m

  vuln:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  build-check:
    runs-on: ubuntu-latest
    needs: [lint, vuln]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify build compiles
        run: go build ./...

      - name: Run go vet
        run: go vet ./...

  unit-tests:
    runs-on: ubuntu-latest
    needs: [build-check]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit tests with coverage
        env:
          BOT_TOKEN: test_token_placeholder
          LOG_LEVEL: warn
          MIGRATIONS_DIR: db/migrations
        run: go test -v -race -short -timeout 60s -coverprofile=coverage.out ./...

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.out
          retention-days: 14

  web-build:
    runs-on: ubuntu-latest
    needs: [build-check]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Lint Mini App
        working-directory: web
        run: npm run lint

      - name: Run Mini App tests with coverage
        working-directory: web
        run: npm run test:coverage

      - name: Build Mini App
        working-directory: web
        run: npm run build

      - name: Upload web coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: web/coverage
          retention-days: 14

  integration-tests:
    runs-on: ubuntu-latest
    needs: [unit-tests]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: moneytracker_test
          POSTGRES_USER: moneytracker
          POSTGRES_PASSWORD: moneytracker
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U moneytracker -d moneytracker_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run migrations
        env:
          DATABASE_URL: postgres://moneytracker:moneytracker@localhost:5432/moneytracker_test?sslmode=disable
        run: go run github.com/pressly/goose/v3/cmd/goose -dir db/migrations postgres "$DATABASE_URL" up

      - name: Run integration tests
        env:
          BOT_TOKEN: test_token_placeholder
          DATABASE_URL: postgres://moneytracker:moneytracker@localhost:5432/moneytracker_test?sslmode=disable
          REDIS_URL: redis://localhost:6379
          LOG_LEVEL: warn
          MIGRATIONS_DIR: db/migrations
        run: go test -v -race -tags integration -timeout 120s -p 2 ./...
