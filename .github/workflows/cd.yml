name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production

    env:
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Linux amd64 binaries
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
            go build -ldflags="-s -w" -o bin/bot ./cmd/bot
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
            go build -ldflags="-s -w" -o bin/goose \
            github.com/pressly/goose/v3/cmd/goose

      - name: Configure SSH agent
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy artifacts to server
        run: |
          tar czf - \
            --transform 's|^bin/bot$|bot.new|' \
            --transform 's|^bin/goose$|goose|' \
            --transform 's|^db/migrations|migrations|' \
            --transform 's|^deployments/moneytracker\.service$|moneytracker.service|' \
            --transform 's|^deployments/docker-compose\.yml$|docker-compose.yml|' \
            bin/bot bin/goose db/migrations \
            deployments/moneytracker.service deployments/docker-compose.yml \
            | ssh "${DEPLOY_USER}@${DEPLOY_HOST}" \
                'tar xzf - -C /opt/moneytracker \
                 && mv /opt/moneytracker/moneytracker.service /tmp/'

      - name: Deploy on server
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: |
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "BOT_TOKEN='${BOT_TOKEN}' DATABASE_URL='${DATABASE_URL}' REDIS_URL='${REDIS_URL}' bash -s" \
            < deployments/deploy.sh

      - name: Verify service is running
        run: |
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" 'bash -s' < deployments/smoke-test.sh

      - name: Write deployment summary
        if: always()
        env:
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
          COMMIT_BRANCH: ${{ github.event.workflow_run.head_branch }}
          JOB_STATUS: ${{ job.status }}
        run: |
          BINARY_SIZE=$(stat -c%s bin/bot 2>/dev/null || echo "unknown")
          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Status | ${JOB_STATUS} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${COMMIT_SHA}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | \`${COMMIT_BRANCH}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Binary size | ${BINARY_SIZE} bytes |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Deployed at | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> "$GITHUB_STEP_SUMMARY"
