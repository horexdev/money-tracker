name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Linux binaries
        # -s -w strips debug symbols for a smaller binary
        run: |
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o bin/bot ./cmd/bot
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o bin/goose github.com/pressly/goose/v3/cmd/goose

      - name: Write SSH key
        run: |
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Copy binary and migrations to server
        run: |
          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            bin/bot \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/moneytracker/bot.new
          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            bin/goose \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/moneytracker/goose
          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no -r \
            db/migrations \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/moneytracker/
          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            deployments/moneytracker.service \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/moneytracker.service
          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            deployments/docker-compose.yml \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/moneytracker/docker-compose.yml

      - name: Deploy on server
        run: |
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "set -e
             cd /opt/moneytracker
             mv bot.new bot
             chmod +x bot
             cat > .env << 'ENVEOF'
BOT_TOKEN=${{ secrets.BOT_TOKEN }}
DATABASE_URL=${{ secrets.DATABASE_URL }}
REDIS_URL=${{ secrets.REDIS_URL }}
LOG_LEVEL=info
MIGRATIONS_DIR=/opt/moneytracker/migrations
ENVEOF
             chmod 600 .env
             sudo mv /tmp/moneytracker.service /etc/systemd/system/moneytracker.service
             sudo systemctl daemon-reload
             sudo systemctl enable moneytracker
             chmod +x goose
             sudo docker compose -f docker-compose.yml pull --quiet
             sudo docker compose -f docker-compose.yml up -d --remove-orphans
             ./goose -dir migrations postgres '${{ secrets.DATABASE_URL }}' up
             sudo systemctl restart moneytracker"

      - name: Cleanup SSH key
        if: always()
        run: rm -f /tmp/deploy_key
